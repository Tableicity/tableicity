<svg xmlns="http://www.w3.org/2000/svg" width="950" height="1300" viewBox="0 0 950 1300">
  <rect width="950" height="1300" fill="white"/>
  <text x="475" y="30" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold">FIG. 10 — Haylo AI: Intent Lifecycle with Conditional Proof Gating</text>

  <!-- Stage 1: NL Input (600) -->
  <rect x="275" y="55" width="400" height="60" fill="white" stroke="black" stroke-width="2" rx="5"/>
  <text x="475" y="78" text-anchor="middle" font-family="Arial" font-size="12">Natural Language Input from User Device (10)</text>
  <text x="475" y="95" text-anchor="middle" font-family="Arial" font-size="10">"Verify that Sarah Chen holds at least 15% of Series A Preferred shares"</text>
  <text x="475" y="110" text-anchor="middle" font-family="Arial" font-size="11" font-style="italic">(600)</text>

  <!-- Arrow -->
  <line x1="475" y1="115" x2="475" y2="150" stroke="black" stroke-width="2"/>
  <polygon points="470,145 480,145 475,155" fill="black"/>

  <!-- Stage 2: Intent Record Created — status: analyzing (602) -->
  <rect x="275" y="155" width="400" height="50" fill="white" stroke="black" stroke-width="2" rx="5"/>
  <text x="475" y="177" text-anchor="middle" font-family="Arial" font-size="12">Intent Record Created in haylo_intents</text>
  <text x="475" y="195" text-anchor="middle" font-family="Arial" font-size="11">status: "analyzing" — tenant_id scoped to isolated schema</text>
  <text x="660" y="198" font-family="Arial" font-size="10" font-style="italic">(602)</text>

  <!-- Arrow -->
  <line x1="475" y1="205" x2="475" y2="240" stroke="black" stroke-width="2"/>
  <polygon points="470,235 480,235 475,245" fill="black"/>

  <!-- Stage 3: External Inference Engine (502) -->
  <rect x="225" y="245" width="500" height="75" fill="white" stroke="black" stroke-width="2" rx="5"/>
  <text x="475" y="268" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">External Inference Engine (502)</text>
  <text x="475" y="288" text-anchor="middle" font-family="Arial" font-size="11">Vendor-agnostic LLM: NL → structured JSON intent</text>
  <text x="475" y="305" text-anchor="middle" font-family="Arial" font-size="10">Stateless — no direct DB access, no schema awareness, no gate bypass</text>

  <!-- Arrow -->
  <line x1="475" y1="320" x2="475" y2="355" stroke="black" stroke-width="2"/>
  <polygon points="470,350 480,350 475,360" fill="black"/>

  <!-- Stage 4: Structured Intent — status: proposed (604) -->
  <rect x="225" y="360" width="500" height="65" fill="white" stroke="black" stroke-width="2" rx="5"/>
  <text x="475" y="383" text-anchor="middle" font-family="Arial" font-size="12">Deterministic Intent Output (504) stored in intent record</text>
  <text x="475" y="400" text-anchor="middle" font-family="Arial" font-size="11">status: "proposed" — canGenerateProof: true/false, proofParameters: {...}</text>
  <text x="475" y="418" text-anchor="middle" font-family="Arial" font-size="10">Presented to User Device (10) for human review</text>
  <text x="710" y="418" font-family="Arial" font-size="10" font-style="italic">(604)</text>

  <!-- Arrow -->
  <line x1="475" y1="425" x2="475" y2="465" stroke="black" stroke-width="2"/>
  <polygon points="470,460 480,460 475,470" fill="black"/>

  <!-- Stage 5: Human Review Decision Diamond (606) -->
  <polygon points="475,475 600,535 475,595 350,535" fill="white" stroke="black" stroke-width="2"/>
  <text x="475" y="525" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Human</text>
  <text x="475" y="542" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Review</text>
  <text x="475" y="559" text-anchor="middle" font-family="Arial" font-size="10" font-style="italic">(606)</text>

  <!-- Reject path — left -->
  <line x1="350" y1="535" x2="200" y2="535" stroke="black" stroke-width="2"/>
  <text x="285" y="525" font-family="Arial" font-size="11">Reject</text>
  <rect x="75" y="510" width="130" height="55" fill="white" stroke="black" stroke-width="2" rx="5"/>
  <text x="140" y="533" text-anchor="middle" font-family="Arial" font-size="11">status: "rejected"</text>
  <text x="140" y="550" text-anchor="middle" font-family="Arial" font-size="10">+ rejection reason</text>
  <text x="140" y="562" text-anchor="middle" font-family="Arial" font-size="10" font-style="italic">(608)</text>

  <!-- Approve path — down -->
  <line x1="475" y1="595" x2="475" y2="640" stroke="black" stroke-width="2"/>
  <text x="495" y="620" font-family="Arial" font-size="11">Approve</text>
  <polygon points="470,635 480,635 475,645" fill="black"/>

  <!-- Conditional Gating Decision Diamond (610) -->
  <polygon points="475,650 620,720 475,790 330,720" fill="white" stroke="black" stroke-width="2.5"/>
  <text x="475" y="710" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">executeProof</text>
  <text x="475" y="728" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">= true?</text>
  <text x="475" y="748" text-anchor="middle" font-family="Arial" font-size="10" font-style="italic">Conditional Gate (610)</text>

  <!-- FALSE path — left: non-proof approval -->
  <line x1="330" y1="720" x2="140" y2="720" stroke="black" stroke-width="2"/>
  <text x="245" y="710" font-family="Arial" font-size="11" font-weight="bold">false</text>
  <polygon points="145,715 145,725 135,720" fill="black"/>

  <!-- Non-proof approval box (612) -->
  <rect x="20" y="680" width="120" height="85" fill="white" stroke="black" stroke-width="2" rx="5"/>
  <text x="80" y="700" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold">Non-Proof</text>
  <text x="80" y="715" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold">Approval</text>
  <text x="80" y="733" text-anchor="middle" font-family="Arial" font-size="10">status: "approved"</text>
  <text x="80" y="748" text-anchor="middle" font-family="Arial" font-size="10">Gates 3-4 skipped</text>
  <text x="80" y="760" text-anchor="middle" font-family="Arial" font-size="10" font-style="italic">(612)</text>

  <!-- Label: No meter impact -->
  <text x="80" y="780" text-anchor="middle" font-family="Arial" font-size="9">No meter deduction</text>
  <text x="80" y="792" text-anchor="middle" font-family="Arial" font-size="9">No circuit execution</text>

  <!-- TRUE path — down: proof-generating approval -->
  <line x1="475" y1="790" x2="475" y2="830" stroke="black" stroke-width="2"/>
  <text x="495" y="815" font-family="Arial" font-size="11" font-weight="bold">true</text>
  <polygon points="470,825 480,825 475,835" fill="black"/>

  <!-- Gate 1+2 pass-through (614) -->
  <rect x="300" y="835" width="350" height="45" fill="white" stroke="black" stroke-width="2" rx="5"/>
  <text x="475" y="855" text-anchor="middle" font-family="Arial" font-size="11">Gate 1 (400) + Gate 2 (402): Identity + Schema verified</text>
  <text x="475" y="872" text-anchor="middle" font-family="Arial" font-size="10" font-style="italic">Already traversed during intent submission (614)</text>

  <!-- Arrow -->
  <line x1="475" y1="880" x2="475" y2="910" stroke="black" stroke-width="2"/>
  <polygon points="470,905 480,905 475,915" fill="black"/>

  <!-- Gate 3: Conditional checkProofAccess (616) -->
  <rect x="250" y="915" width="450" height="80" fill="white" stroke="black" stroke-width="2.5" rx="5"/>
  <text x="475" y="938" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Gate 3 — Conditional checkProofAccess (404)</text>
  <text x="475" y="956" text-anchor="middle" font-family="Arial" font-size="11">Promise-based middleware wrapper: invoke checkProofAccess programmatically</text>
  <text x="475" y="972" text-anchor="middle" font-family="Arial" font-size="10">Verify tier config → query Proof Allocation Meter (56) → enforce governance</text>
  <text x="475" y="988" text-anchor="middle" font-family="Arial" font-size="10" font-style="italic">(616)</text>

  <!-- Governor Hard-Stop — right -->
  <line x1="700" y1="955" x2="810" y2="955" stroke="black" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="745" y="945" font-family="Arial" font-size="10">Meter exhausted</text>
  <rect x="810" y="930" width="120" height="55" fill="white" stroke="black" stroke-width="2" rx="5"/>
  <text x="870" y="950" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold">Governor</text>
  <text x="870" y="965" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold">Hard-Stop</text>
  <text x="870" y="980" text-anchor="middle" font-family="Arial" font-size="10">402 — limit reached</text>

  <!-- Arrow down from Gate 3 -->
  <line x1="475" y1="995" x2="475" y2="1025" stroke="black" stroke-width="2"/>
  <text x="495" y="1015" font-family="Arial" font-size="10">Meter OK</text>
  <polygon points="470,1020 480,1020 475,1030" fill="black"/>

  <!-- Gate 4: Proof Execution + Atomic Metered Deduction (618) -->
  <rect x="250" y="1030" width="450" height="75" fill="white" stroke="black" stroke-width="2" rx="5"/>
  <text x="475" y="1053" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Gate 4 — NOIR Circuit Execution + Atomic Result (406)</text>
  <text x="475" y="1071" text-anchor="middle" font-family="Arial" font-size="11">createProofResult() (65) + incrementProofUsage() (66)</text>
  <text x="475" y="1088" text-anchor="middle" font-family="Arial" font-size="10">request_source: "AI_HAYLO" — failed proofs do not deplete allocation</text>
  <text x="475" y="1100" text-anchor="middle" font-family="Arial" font-size="10" font-style="italic">(618)</text>

  <!-- Arrow -->
  <line x1="475" y1="1105" x2="475" y2="1135" stroke="black" stroke-width="2"/>
  <polygon points="470,1130 480,1130 475,1140" fill="black"/>

  <!-- Intent Updated — status: executed (620) -->
  <rect x="275" y="1140" width="400" height="50" fill="white" stroke="black" stroke-width="2" rx="5"/>
  <text x="475" y="1162" text-anchor="middle" font-family="Arial" font-size="12">Intent Record Updated: status "executed" + proofRequestId</text>
  <text x="475" y="1180" text-anchor="middle" font-family="Arial" font-size="10">Verification URL (42) returned via Security Ritual UX (FIG. 5)</text>
  <text x="660" y="1183" font-family="Arial" font-size="10" font-style="italic">(620)</text>

  <!-- Shared Meter annotation box — bottom right -->
  <rect x="680" y="1050" width="250" height="115" fill="white" stroke="black" stroke-width="1.5" rx="5" stroke-dasharray="4,2"/>
  <text x="805" y="1070" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold">Shared Proof Allocation Meter</text>
  <line x1="700" y1="1078" x2="910" y2="1078" stroke="black" stroke-width="0.5"/>
  <text x="805" y="1095" text-anchor="middle" font-family="Arial" font-size="9">MANUAL requests (Privacy Vault)</text>
  <text x="805" y="1110" text-anchor="middle" font-family="Arial" font-size="9">+ AI_HAYLO requests (Haylo AI)</text>
  <text x="805" y="1125" text-anchor="middle" font-family="Arial" font-size="9">= Single metered total per tenant</text>
  <text x="805" y="1142" text-anchor="middle" font-family="Arial" font-size="9">per billing period</text>
  <text x="805" y="1157" text-anchor="middle" font-family="Arial" font-size="9" font-style="italic">UNIQUE(tenant_id, billing_month)</text>

  <!-- Arrow from shared meter to Gate 4 -->
  <line x1="680" y1="1085" x2="700" y2="1070" stroke="black" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Intent Status Lifecycle annotation — bottom left -->
  <rect x="20" y="1100" width="230" height="110" fill="white" stroke="black" stroke-width="1.5" rx="5" stroke-dasharray="4,2"/>
  <text x="135" y="1118" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold">Intent Status Lifecycle</text>
  <line x1="40" y1="1125" x2="230" y2="1125" stroke="black" stroke-width="0.5"/>
  <text x="135" y="1140" text-anchor="middle" font-family="Arial" font-size="9">pending → analyzing → proposed</text>
  <text x="135" y="1155" text-anchor="middle" font-family="Arial" font-size="9">→ approved (no proof) ─┐</text>
  <text x="135" y="1170" text-anchor="middle" font-family="Arial" font-size="9">→ executed (with proof) ─┤ terminal</text>
  <text x="135" y="1185" text-anchor="middle" font-family="Arial" font-size="9">→ rejected ─────────────┤</text>
  <text x="135" y="1200" text-anchor="middle" font-family="Arial" font-size="9">→ failed ───────────────┘</text>

  <!-- Legend -->
  <text x="475" y="1250" text-anchor="middle" font-family="Arial" font-size="10" font-style="italic">Reference: 600=NL Input, 602=Record Created, 604=Proposed, 606=Human Review, 608=Rejected, 610=Conditional Gate</text>
  <text x="475" y="1267" text-anchor="middle" font-family="Arial" font-size="10" font-style="italic">612=Non-Proof Approval, 614=Gates 1-2, 616=Conditional checkProofAccess, 618=Circuit+Meter, 620=Executed</text>
  <text x="475" y="1284" text-anchor="middle" font-family="Arial" font-size="10" font-style="italic">Cross-ref: (10) User Device, (502)(504) FIG. 9, (400-406) FIG. 8, (56)(65)(66) FIG. 2/4, (42) FIG. 1</text>
</svg>
