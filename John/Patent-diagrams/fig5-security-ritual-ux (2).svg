<svg xmlns="http://www.w3.org/2000/svg" width="900" height="550" viewBox="0 0 900 550">
  <rect width="900" height="550" fill="white"/>
  <text x="450" y="30" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold">FIG. 5 — Security Ritual UX: State Transition Diagram</text>

  <!-- State 1: Idle (80) -->
  <ellipse cx="130" cy="150" rx="90" ry="45" fill="white" stroke="black" stroke-width="2"/>
  <text x="130" y="143" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">IDLE</text>
  <text x="130" y="160" text-anchor="middle" font-family="Arial" font-size="10">Awaiting user input</text>
  <text x="130" y="178" text-anchor="middle" font-family="Arial" font-size="10" font-style="italic">(80)</text>

  <!-- Arrow: User initiates ZKP -->
  <line x1="220" y1="150" x2="310" y2="150" stroke="black" stroke-width="2"/>
  <polygon points="305,145 305,155 315,150" fill="black"/>
  <text x="265" y="140" text-anchor="middle" font-family="Arial" font-size="10">User initiates</text>
  <text x="265" y="128" text-anchor="middle" font-family="Arial" font-size="10">ZKP request</text>

  <!-- State 2: Processing (82) -->
  <ellipse cx="410" cy="150" rx="90" ry="45" fill="white" stroke="black" stroke-width="2"/>
  <text x="410" y="140" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">PROCESSING</text>
  <text x="410" y="157" text-anchor="middle" font-family="Arial" font-size="10">Animation active</text>
  <text x="410" y="172" text-anchor="middle" font-family="Arial" font-size="10">0% → 98%</text>
  <text x="410" y="185" text-anchor="middle" font-family="Arial" font-size="10" font-style="italic">(82)</text>

  <!-- Arrow: Progress reaches threshold -->
  <line x1="500" y1="150" x2="590" y2="150" stroke="black" stroke-width="2"/>
  <polygon points="585,145 585,155 595,150" fill="black"/>
  <text x="545" y="140" text-anchor="middle" font-family="Arial" font-size="10">Progress hits</text>
  <text x="545" y="128" text-anchor="middle" font-family="Arial" font-size="10">threshold</text>

  <!-- State 3: 98% Cap Hold (84) -->
  <ellipse cx="690" cy="150" rx="90" ry="45" fill="white" stroke="black" stroke-width="2"/>
  <text x="690" y="138" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">98% CAP</text>
  <text x="690" y="155" text-anchor="middle" font-family="Arial" font-size="10">requestAnimationFrame</text>
  <text x="690" y="170" text-anchor="middle" font-family="Arial" font-size="10">holds at 98%</text>
  <text x="690" y="185" text-anchor="middle" font-family="Arial" font-size="10" font-style="italic">(84)</text>

  <!-- Arrow down: Server proof complete -->
  <line x1="690" y1="195" x2="690" y2="290" stroke="black" stroke-width="2"/>
  <polygon points="685,285 695,285 690,295" fill="black"/>
  <text x="750" y="245" font-family="Arial" font-size="10">Server confirms</text>
  <text x="750" y="258" font-family="Arial" font-size="10">proof complete</text>

  <!-- State 4: Verified (86) -->
  <ellipse cx="690" cy="340" rx="90" ry="45" fill="white" stroke="black" stroke-width="2"/>
  <text x="690" y="333" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">VERIFIED</text>
  <text x="690" y="350" text-anchor="middle" font-family="Arial" font-size="10">100% — Proof valid</text>
  <text x="690" y="365" text-anchor="middle" font-family="Arial" font-size="10">URL displayed</text>
  <text x="690" y="380" text-anchor="middle" font-family="Arial" font-size="10" font-style="italic">(86)</text>

  <!-- Arrow back to Idle -->
  <line x1="600" y1="340" x2="220" y2="170" stroke="black" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="223,165 218,174 225,173" fill="black"/>
  <text x="380" y="275" text-anchor="middle" font-family="Arial" font-size="10">User returns</text>
  <text x="380" y="288" text-anchor="middle" font-family="Arial" font-size="10">to Idle</text>

  <!-- Error State (88) -->
  <ellipse cx="410" cy="380" rx="90" ry="45" fill="white" stroke="black" stroke-width="2"/>
  <text x="410" y="373" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">ERROR</text>
  <text x="410" y="390" text-anchor="middle" font-family="Arial" font-size="10">Proof generation failed</text>
  <text x="410" y="407" text-anchor="middle" font-family="Arial" font-size="10" font-style="italic">(88)</text>

  <!-- Arrow from Processing to Error -->
  <line x1="410" y1="195" x2="410" y2="335" stroke="black" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="405,330 415,330 410,340" fill="black"/>
  <text x="435" y="270" font-family="Arial" font-size="10">failure</text>

  <!-- Arrow from Error back to Idle -->
  <line x1="320" y1="380" x2="190" y2="185" stroke="black" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="193,180 188,189 195,187" fill="black"/>
  <text x="230" y="305" font-family="Arial" font-size="10">retry / dismiss</text>

  <!-- 98% Cap Explanation Box -->
  <rect x="100" y="440" width="700" height="80" fill="white" stroke="black" stroke-width="1.5" rx="5"/>
  <text x="450" y="462" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold">Key Mechanism: 98% Progress Cap</text>
  <text x="450" y="480" text-anchor="middle" font-family="Arial" font-size="10">The visual progress animation (via requestAnimationFrame) is capped at 98% to prevent</text>
  <text x="450" y="495" text-anchor="middle" font-family="Arial" font-size="10">premature "completion" display. The final 2% transition occurs only upon receipt of</text>
  <text x="450" y="510" text-anchor="middle" font-family="Arial" font-size="10">server-side proof verification, ensuring visual state matches cryptographic reality.</text>

  <!-- Legend -->
  <text x="450" y="540" text-anchor="middle" font-family="Arial" font-size="10" font-style="italic">Reference: 80=Idle, 82=Processing, 84=98% Cap Hold, 86=Verified, 88=Error State</text>
</svg>