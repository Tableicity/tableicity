<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1050" viewBox="0 0 900 1050">
  <rect width="900" height="1050" fill="white"/>
  <text x="450" y="30" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold">FIG. 9 — Haylo AI: Intent-to-Middleware Pipeline</text>

  <!-- User NL Input (500) -->
  <rect x="275" y="55" width="350" height="65" fill="white" stroke="black" stroke-width="2" rx="5"/>
  <text x="450" y="78" text-anchor="middle" font-family="Arial" font-size="12">Natural Language Input</text>
  <text x="450" y="95" text-anchor="middle" font-family="Arial" font-size="10">User submits term sheet or equity scenario via Haylo AI interface</text>
  <text x="450" y="112" text-anchor="middle" font-family="Arial" font-size="11" font-style="italic">(500)</text>

  <!-- Arrow -->
  <line x1="450" y1="120" x2="450" y2="160" stroke="black" stroke-width="2"/>
  <polygon points="445,155 455,155 450,165" fill="black"/>

  <!-- Inference Engine / Grok (502) -->
  <rect x="225" y="165" width="450" height="85" fill="white" stroke="black" stroke-width="2" rx="5"/>
  <text x="450" y="190" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">External Inference Engine</text>
  <text x="450" y="210" text-anchor="middle" font-family="Arial" font-size="11">LLM processes term sheet context against tenant data patterns</text>
  <text x="450" y="228" text-anchor="middle" font-family="Arial" font-size="10">Vendor-agnostic: system accepts any compliant inference provider</text>
  <text x="450" y="244" text-anchor="middle" font-family="Arial" font-size="11" font-style="italic">(502)</text>

  <!-- Arrow -->
  <line x1="450" y1="250" x2="450" y2="290" stroke="black" stroke-width="2"/>
  <polygon points="445,285 455,285 450,295" fill="black"/>

  <!-- Structured JSON Intent Output (504) -->
  <rect x="225" y="295" width="450" height="85" fill="white" stroke="black" stroke-width="2" rx="5"/>
  <text x="450" y="318" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Deterministic Intent Output</text>
  <text x="450" y="338" text-anchor="middle" font-family="Arial" font-size="11">Structured JSON: {"new_shares", "price_per_share", "dilution_pct", ...}</text>
  <text x="450" y="356" text-anchor="middle" font-family="Arial" font-size="10">Non-deterministic NL transformed into deterministic state-change request</text>
  <text x="450" y="374" text-anchor="middle" font-family="Arial" font-size="11" font-style="italic">(504)</text>

  <!-- Arrow -->
  <line x1="450" y1="380" x2="450" y2="420" stroke="black" stroke-width="2"/>
  <polygon points="445,415 455,415 450,425" fill="black"/>

  <!-- Four-Gate Middleware Interception (506) -->
  <rect x="175" y="425" width="550" height="100" fill="white" stroke="black" stroke-width="2.5" rx="5"/>
  <text x="450" y="450" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Four-Gate Middleware Interception (12)</text>
  <text x="450" y="470" text-anchor="middle" font-family="Arial" font-size="11">Gate 1 (400): Verify TenantID → Gate 2 (402): Route to isolated schema</text>
  <text x="450" y="488" text-anchor="middle" font-family="Arial" font-size="11">Gate 3 (404): Policy enforcement + Governor check → Gate 4 (406): Result verification</text>
  <text x="450" y="504" text-anchor="middle" font-family="Arial" font-size="10">AI intent is subordinate to technical constraints of the middleware</text>
  <text x="450" y="520" text-anchor="middle" font-family="Arial" font-size="11" font-style="italic">(506)</text>

  <!-- Arrow -->
  <line x1="450" y1="525" x2="450" y2="565" stroke="black" stroke-width="2"/>
  <polygon points="445,560 455,560 450,570" fill="black"/>

  <!-- Meter Pre-Flight Check (508) -->
  <polygon points="450,575 600,640 450,705 300,640" fill="white" stroke="black" stroke-width="2"/>
  <text x="450" y="630" text-anchor="middle" font-family="Arial" font-size="11">Proof Allocation</text>
  <text x="450" y="645" text-anchor="middle" font-family="Arial" font-size="11">Meter (56)</text>
  <text x="450" y="660" text-anchor="middle" font-family="Arial" font-size="11">available?</text>
  <text x="450" y="678" text-anchor="middle" font-family="Arial" font-size="10" font-style="italic">(508)</text>

  <!-- No path -->
  <line x1="600" y1="640" x2="730" y2="640" stroke="black" stroke-width="2"/>
  <text x="655" y="630" font-family="Arial" font-size="11">No</text>
  <rect x="700" y="615" width="160" height="50" fill="white" stroke="black" stroke-width="2" rx="5"/>
  <text x="780" y="638" text-anchor="middle" font-family="Arial" font-size="11">Block AI Request</text>
  <text x="780" y="655" text-anchor="middle" font-family="Arial" font-size="10">(Governor Hard-Stop)</text>

  <!-- Yes path -->
  <line x1="450" y1="705" x2="450" y2="745" stroke="black" stroke-width="2"/>
  <text x="465" y="728" font-family="Arial" font-size="11">Yes</text>
  <polygon points="445,740 455,740 450,750" fill="black"/>

  <!-- NOIR Circuit Execution (510) -->
  <rect x="225" y="750" width="450" height="70" fill="white" stroke="black" stroke-width="2" rx="5"/>
  <text x="450" y="775" text-anchor="middle" font-family="Arial" font-size="12">NOIR Circuit Engine (40) executes ownership_threshold</text>
  <text x="450" y="795" text-anchor="middle" font-family="Arial" font-size="10">Middleware triggers existing circuits — AI never touches cryptographic math directly</text>
  <text x="450" y="813" text-anchor="middle" font-family="Arial" font-size="11" font-style="italic">(510)</text>

  <!-- Arrow -->
  <line x1="450" y1="820" x2="450" y2="855" stroke="black" stroke-width="2"/>
  <polygon points="445,850 455,850 450,860" fill="black"/>

  <!-- Atomic Result + Metered Deduction (512) -->
  <rect x="200" y="860" width="500" height="70" fill="white" stroke="black" stroke-width="2" rx="5"/>
  <text x="450" y="883" text-anchor="middle" font-family="Arial" font-size="12">Atomic Proof Storage (65) + Usage Increment (66)</text>
  <text x="450" y="903" text-anchor="middle" font-family="Arial" font-size="10">Meter deduction only upon successful proof — failed inferences do not deplete allocation</text>
  <text x="450" y="923" text-anchor="middle" font-family="Arial" font-size="11" font-style="italic">(512)</text>

  <!-- Arrow -->
  <line x1="450" y1="930" x2="450" y2="960" stroke="black" stroke-width="2"/>
  <polygon points="445,955 455,955 450,965" fill="black"/>

  <!-- Result returned via Security Ritual (514) -->
  <rect x="250" y="965" width="400" height="50" fill="white" stroke="black" stroke-width="2" rx="5"/>
  <text x="450" y="988" text-anchor="middle" font-family="Arial" font-size="12">Verified Result + Verification URL (42)</text>
  <text x="450" y="1005" text-anchor="middle" font-family="Arial" font-size="10" font-style="italic">Returned via Security Ritual UX (FIG. 5) — (514)</text>

  <!-- Legend -->
  <text x="450" y="1030" text-anchor="middle" font-family="Arial" font-size="10" font-style="italic">Reference: 500=NL Input, 502=Inference Engine, 504=JSON Intent, 506=Middleware Interception, 508=Meter Check, 510=Circuit Exec, 512=Atomic Result, 514=Verified Output</text>
  <text x="450" y="1045" text-anchor="middle" font-family="Arial" font-size="10" font-style="italic">Cross-ref: (12) FIG. 1, (40)(42) FIG. 1, (56) FIG. 2, (65)(66) FIG. 4, (400-406) FIG. 8</text>
</svg>