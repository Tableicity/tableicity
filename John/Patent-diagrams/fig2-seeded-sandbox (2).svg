<svg xmlns="http://www.w3.org/2000/svg" width="900" height="650" viewBox="0 0 900 650">
  <rect width="900" height="650" fill="white"/>
  <text x="450" y="30" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold">FIG. 2 — Seeded Sandbox Environment</text>

  <!-- Sandbox boundary -->
  <rect x="50" y="50" width="800" height="520" fill="none" stroke="black" stroke-width="2" stroke-dasharray="10,5" rx="15"/>
  <text x="450" y="75" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold">Seeded Sandbox Environment</text>

  <!-- seedZkpData() Function (50) -->
  <rect x="100" y="95" width="300" height="70" fill="white" stroke="black" stroke-width="2" rx="5"/>
  <text x="250" y="122" text-anchor="middle" font-family="Arial" font-size="13">seedZkpData() Initialization</text>
  <text x="250" y="142" text-anchor="middle" font-family="Arial" font-size="11">Generates mock equity dataset</text>
  <text x="250" y="157" text-anchor="middle" font-family="Arial" font-size="11" font-style="italic">(50)</text>

  <!-- Arrow right -->
  <line x1="400" y1="130" x2="480" y2="130" stroke="black" stroke-width="2"/>
  <polygon points="475,125 475,135 485,130" fill="black"/>

