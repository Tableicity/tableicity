  <text x="450" y="350" text-anchor="middle" font-family="Arial" font-size="11">PrivacyVault.tsx</text>
  <text x="450" y="368" text-anchor="middle" font-family="Arial" font-size="11">User selects stakeholder → Initiates ZKP request</text>
  <text x="450" y="380" text-anchor="middle" font-family="Arial" font-size="11" font-style="italic">(54)</text>

  <!-- Arrow down -->
  <line x1="450" y1="385" x2="450" y2="420" stroke="black" stroke-width="2"/>
  <polygon points="445,415 455,415 450,425" fill="black"/>

