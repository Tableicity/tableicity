  <text x="450" y="482" text-anchor="middle" font-family="Arial" font-size="10">Computational Governor for Manual and External Inference Agents</text>
  <text x="450" y="500" text-anchor="middle" font-family="Arial" font-size="11" font-style="italic">(56)</text>

  <!-- Usage indicators -->
  <rect x="290" y="520" width="20" height="20" fill="black" stroke="black" stroke-width="1"/>
  <rect x="315" y="520" width="20" height="20" fill="black" stroke="black" stroke-width="1"/>
  <rect x="340" y="520" width="20" height="20" fill="black" stroke="black" stroke-width="1"/>
  <rect x="365" y="520" width="20" height="20" fill="white" stroke="black" stroke-width="1"/>
  <rect x="390" y="520" width="20" height="20" fill="white" stroke="black" stroke-width="1"/>
  <rect x="415" y="520" width="20" height="20" fill="white" stroke="black" stroke-width="1"/>
  <rect x="440" y="520" width="20" height="20" fill="white" stroke="black" stroke-width="1"/>
  <rect x="465" y="520" width="20" height="20" fill="white" stroke="black" stroke-width="1"/>
  <rect x="490" y="520" width="20" height="20" fill="white" stroke="black" stroke-width="1"/>
  <rect x="515" y="520" width="20" height="20" fill="white" stroke="black" stroke-width="1"/>
  <text x="380" y="558" text-anchor="middle" font-family="Arial" font-size="10">Used: 3/10</text>
  <text x="530" y="558" text-anchor="middle" font-family="Arial" font-size="10">Remaining: 7/10</text>

  <!-- Legend -->
  <text x="450" y="600" text-anchor="middle" font-family="Arial" font-size="10" font-style="italic">Reference: 50=seedZkpData(), 52=Mock Securities Store, 54=Privacy Vault UI, 56=Proof Allocation Meter</text>
  <text x="450" y="618" text-anchor="middle" font-family="Arial" font-size="10" font-style="italic">Meter (56) acts as Computational Governor for both manual and AI-driven inference requests</text>
