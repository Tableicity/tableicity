  <text x="640" y="136" text-anchor="middle" font-family="Arial" font-size="11">4 Securities + SHA-256 Hashes</text>
  <text x="640" y="157" text-anchor="middle" font-family="Arial" font-size="11" font-style="italic">(52)</text>

