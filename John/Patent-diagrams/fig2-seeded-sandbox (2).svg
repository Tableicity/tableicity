  <text x="210" y="238" text-anchor="middle" font-family="Arial" font-size="9">hash: a3f2...c8d1</text>

  <rect x="310" y="200" width="160" height="50" fill="white" stroke="black" stroke-width="1.5" rx="3"/>
  <text x="390" y="222" text-anchor="middle" font-family="Arial" font-size="10">Security B</text>
  <text x="390" y="238" text-anchor="middle" font-family="Arial" font-size="9">hash: b7e4...f2a9</text>

  <rect x="490" y="200" width="160" height="50" fill="white" stroke="black" stroke-width="1.5" rx="3"/>
  <text x="570" y="222" text-anchor="middle" font-family="Arial" font-size="10">Security C</text>
  <text x="570" y="238" text-anchor="middle" font-family="Arial" font-size="9">hash: c1d8...e5b3</text>

  <rect x="670" y="200" width="160" height="50" fill="white" stroke="black" stroke-width="1.5" rx="3"/>
  <text x="750" y="222" text-anchor="middle" font-family="Arial" font-size="10">Security D</text>
  <text x="750" y="238" text-anchor="middle" font-family="Arial" font-size="9">hash: d9f6...a7c2</text>

  <!-- Arrow down from securities to Privacy Vault -->
  <line x1="450" y1="250" x2="450" y2="300" stroke="black" stroke-width="2"/>
  <polygon points="445,295 455,295 450,305" fill="black"/>
  <text x="470" y="280" font-family="Arial" font-size="10">data access</text>

